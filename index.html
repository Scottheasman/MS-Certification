<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microsoft Cert Prep Plan</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #e8e6e0; font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0a0a0f; } ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const certs = [
  {
    phase: 1,
    phaseLabel: "Phase 1 — Foundations",
    phaseDesc: "All 4 founders complete these. Fast, inexpensive, and immediately contribute to your Partner Capability Score.",
    color: "#00C9A7",
    items: [
      {
        id: "AB-900", name: "Copilot & Agent Administration Fundamentals", level: "Fundamentals",
        cost: "$99", weeks: "2–3 weeks", duration: "45 min", questions: "40–60", passingScore: "700/1000",
        expiry: "Never expires", prerequisite: "None", designation: "Modern Work — Intermediate cert",
        whoTakes: "All 4 founders",
        keyTopics: ["M365 core services", "Data protection & governance", "Copilot & agent administration", "Microsoft Purview basics", "AI billing & lifecycle"],
        freeResource: "Microsoft Learn: AB-900 learning path (free)",
        tip: "Replaces MS-900 from March 2026. The hardest new area is Copilot-specific content — DSPM for AI and agent lifecycle. Spend extra time here as older M365 resources won't cover it."
      },
      {
        id: "SC-900", name: "Security, Compliance & Identity Fundamentals", level: "Fundamentals",
        cost: "$99", weeks: "1–2 weeks", duration: "45 min", questions: "40–60", passingScore: "700/1000",
        expiry: "Never expires", prerequisite: "None", designation: "Security path — Foundation",
        whoTakes: "All 4 founders",
        keyTopics: ["Zero Trust model", "Microsoft Entra ID basics", "Microsoft Purview", "Defender product overview", "Shared responsibility model"],
        freeResource: "Microsoft Learn: SC-900 learning path (free)",
        tip: "The Microsoft Learn path alone is sufficient. Don't over-engineer prep — 1 to 2 weeks of focused study is plenty. This is a conceptual exam, not hands-on."
      },
      {
        id: "AZ-900", name: "Azure Fundamentals", level: "Fundamentals",
        cost: "$99", weeks: "2–4 weeks", duration: "45–85 min", questions: "40–60", passingScore: "700/1000",
        expiry: "Never expires", prerequisite: "None", designation: "Azure path — Foundation",
        whoTakes: "All 4 founders",
        keyTopics: ["Cloud concepts (25–30%)", "Azure architecture & services (35–40%)", "Azure management & governance (30–35%)", "Pricing & SLAs"],
        freeResource: "Microsoft Virtual Training Days — free exam voucher included (saves $99 per person)",
        tip: "Microsoft regularly offers free AZ-900 vouchers via 2-day Virtual Training Day events. Book these for all 4 founders before paying — that is $396 saved immediately."
      },
    ]
  },
  {
    phase: 2,
    phaseLabel: "Phase 2 — Associate Level",
    phaseDesc: "Split across the 4 founders by specialisation. Each person owns their track and goes deep.",
    color: "#FF6B6B",
    items: [
      {
        id: "MD-102", name: "Endpoint Administrator Associate", level: "Associate",
        cost: "$165", weeks: "8–12 weeks", duration: "100 min", questions: "40–60", passingScore: "700/1000",
        expiry: "1 year — free renewal", prerequisite: "None (AZ-900 recommended)", designation: "Modern Work — Intermediate cert",
        whoTakes: "Founder 1",
        keyTopics: ["Windows 11 Autopilot deployment", "Microsoft Intune MDM/MAM", "BitLocker & Defender for Endpoint", "Conditional Access policies", "Microsoft Entra device identity"],
        freeResource: "Microsoft Learn: MD-102 path + free M365 Developer Tenant for labs",
        tip: "Hands-on Intune experience is essential — reading alone will not pass this. Set up a free M365 developer tenant and practice every deployment scenario. Confusing Conditional Access with device compliance is the top failure point."
      },
      {
        id: "MS-700", name: "Teams Administrator Associate", level: "Associate",
        cost: "$165", weeks: "6–8 weeks", duration: "100 min", questions: "40–60", passingScore: "700/1000",
        expiry: "1 year — free renewal", prerequisite: "None (AB-900 recommended)", designation: "Modern Work — Intermediate cert",
        whoTakes: "Founder 4",
        keyTopics: ["Teams deployment & lifecycle", "Meetings & live events", "Teams Phone basics", "Security & compliance in Teams", "Governance & policy management"],
        freeResource: "Microsoft Learn: MS-700 learning path (free)",
        tip: "Take this before MS-721. MS-700 gives the broad Teams admin foundation; MS-721 then dives exclusively deep into voice and telephony. Without MS-700 knowledge, MS-721 is significantly harder."
      },
      {
        id: "SC-300", name: "Identity & Access Administrator Associate", level: "Associate",
        cost: "$165", weeks: "6–10 weeks", duration: "100 min", questions: "40–60", passingScore: "700/1000",
        expiry: "1 year — free renewal", prerequisite: "None (SC-900 recommended)", designation: "Modern Work + Security — Intermediate cert",
        whoTakes: "Founder 2",
        keyTopics: ["Microsoft Entra ID configuration", "Conditional Access policies", "Privileged Identity Management (PIM)", "Multi-factor authentication", "Identity governance & entitlement management"],
        freeResource: "John Savill YouTube (free, highly recommended) + free M365 dev tenant with Entra ID P2",
        tip: "PIM and Conditional Access are the hardest sections and cannot be learned from reading alone. Set up a developer tenant and practice every scenario hands-on. This cert counts toward both Modern Work and Security designations — excellent value."
      },
      {
        id: "SC-200", name: "Security Operations Analyst Associate", level: "Associate",
        cost: "$165", weeks: "8–12 weeks", duration: "120 min", questions: "40–60", passingScore: "700/1000",
        expiry: "1 year — free renewal", prerequisite: "SC-900 strongly recommended", designation: "Security — Intermediate (mandatory step)",
        whoTakes: "Founder 3",
        keyTopics: ["Microsoft Sentinel (50–55% of exam)", "Microsoft 365 Defender (25–30%)", "Defender for Cloud (20–25%)", "Threat hunting", "Incident triage & response"],
        freeResource: "Microsoft Learn: SC-200 path + free Azure trial for Sentinel labs",
        tip: "Microsoft Sentinel makes up over half the exam. Get hands-on with a free Azure trial — configure workspaces, connect data sources, and write KQL queries. Updated April 2026 to include Sentinel MCP Server and Defender XDR automation."
      },
      {
        id: "AZ-500", name: "Azure Security Engineer Associate", level: "Associate",
        cost: "$165", weeks: "8–12 weeks", duration: "120 min", questions: "40–60", passingScore: "700/1000",
        expiry: "1 year — free renewal", prerequisite: "AZ-900 + SC-900 recommended", designation: "Security — Step 1 (mandatory prerequisite for SC-100)",
        whoTakes: "Founder 3",
        keyTopics: ["Identity & access management", "Platform protection", "Security operations", "Data & application security", "Azure Key Vault & Defender for Cloud"],
        freeResource: "Microsoft Learn: AZ-500 learning path + free Azure subscription for labs",
        tip: "Required stepping stone to SC-100. Take SC-200 and AZ-500 in the same study period — they share significant Defender for Cloud content, reducing total study time. Both must be done before SC-100."
      },
    ]
  },
  {
    phase: 3,
    phaseLabel: "Phase 3 — Expert Level",
    phaseDesc: "2–3 founders complete these. Unlocks the advanced cert points required for full Solutions Partner designation.",
    color: "#A78BFA",
    items: [
      {
        id: "MS-102", name: "Microsoft 365 Administrator Expert", level: "Expert",
        cost: "$165", weeks: "6–12 weeks", duration: "120 min", questions: "40–60", passingScore: "700/1000",
        expiry: "1 year — free renewal", prerequisite: "MD-102 (required to sit exam)", designation: "Modern Work — Advanced cert (key designation cert)",
        whoTakes: "Founders 1 & 2",
        keyTopics: ["M365 tenant management (40–45%)", "Microsoft Entra identity & hybrid sync", "M365 security & compliance", "Defender for Office 365", "Hybrid & cloud-only deployment"],
        freeResource: "Microsoft Learn: MS-102 path + M365 developer tenant for labs",
        tip: "The hardest M365 exam. Entra Connect and Cloud Sync hybrid identity topics trip most candidates. Build a test lab with an on-premises domain controller and practice the full sync setup end-to-end. This is a mandatory cert for the Modern Work designation."
      },
      {
        id: "MS-721", name: "Collaboration Communications Systems Engineer", level: "Expert",
        cost: "$165", weeks: "8–12 weeks", duration: "100 min", questions: "40–60", passingScore: "700/1000",
        expiry: "1 year — free renewal", prerequisite: "MS-700 strongly recommended", designation: "Modern Work — Counts as Advanced cert",
        whoTakes: "Founder 4",
        keyTopics: ["Teams Phone design & config (40–45% of exam)", "Meetings & events (10–15%)", "Collaboration systems planning (25–30%)", "Monitoring & troubleshooting (15–20%)", "PowerShell for Teams admin"],
        freeResource: "Microsoft Learn: MS-721 path + Teams developer tenant",
        tip: "Teams Phone dominates nearly half the exam. Heavy PowerShell content — practice in the Teams admin center and PowerShell every day. Telecom engineers find this easier than pure IT admins. Take MS-700 first or this exam will feel extremely steep."
      },
      {
        id: "SC-100", name: "Cybersecurity Architect Expert", level: "Expert",
        cost: "$165", weeks: "10–14 weeks", duration: "120 min", questions: "40–60", passingScore: "700/1000",
        expiry: "1 year — free renewal", prerequisite: "AZ-500 + SC-200 (both strongly recommended before sitting)", designation: "Security — Advanced capstone cert",
        whoTakes: "Founder 3",
        keyTopics: ["Zero Trust & GRC design (20–25%)", "Security operations & identity design (25–30%)", "Infrastructure security architecture (25–30%)", "Application & data security design (20–25%)"],
        freeResource: "Microsoft Learn: SC-100 path + John Savill YouTube (free)",
        tip: "This is a design and architecture exam, not a configuration exam. You will not be asked how to configure Sentinel — you will be asked which security architecture to recommend and why. Shift your mindset completely from administrator to architect before studying."
      },
    ]
  }
];

const levelColor = { "Fundamentals": "#00C9A7", "Associate": "#FF6B6B", "Expert": "#A78BFA" };
const phaseColor = ["#00C9A7", "#FF6B6B", "#A78BFA"];

function App() {
  const [expanded, setExpanded] = React.useState(null);
  const [completed, setCompleted] = React.useState({});
  const [activePhase, setActivePhase] = React.useState("all");

  const toggle = (id) => setExpanded(expanded === id ? null : id);
  const toggleDone = (id, e) => { e.stopPropagation(); setCompleted(p => ({ ...p, [id]: !p[id] })); };

  const allCerts = certs.flatMap(p => p.items);
  const doneCount = Object.values(completed).filter(Boolean).length;
  const pct = Math.round((doneCount / allCerts.length) * 100);
  const totalCost = 99*3*4 + 165*7; // 3 fundamentals x4 founders + 7 role-based
  const visiblePhases = activePhase === "all" ? certs : certs.filter(p => p.phase === parseInt(activePhase));

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0f" }}>

      {/* HEADER */}
      <div style={{ background: "linear-gradient(135deg,#0c0c1e,#111128,#0a0a0f)", borderBottom: "1px solid #1e1e3a", padding: "40px 24px 32px", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", inset: 0, background: "radial-gradient(circle at 15% 50%,rgba(0,201,167,.06),transparent 50%),radial-gradient(circle at 85% 20%,rgba(167,139,250,.06),transparent 50%)", pointerEvents: "none" }} />
        <div style={{ maxWidth: 860, margin: "0 auto", position: "relative" }}>
          <p style={{ fontSize: 10, letterSpacing: ".3em", color: "#00C9A7", textTransform: "uppercase", marginBottom: 10, fontFamily: "'EB Garamond', serif" }}>Microsoft AI Cloud Partner Program</p>
          <h1 style={{ fontFamily: "'EB Garamond', serif", fontSize: "clamp(26px,5vw,40px)", fontWeight: 400, color: "#f0ede8", letterSpacing: "-.02em", marginBottom: 6 }}>Certification Preparation Plan</h1>
          <p style={{ color: "#6a6a7a", fontSize: 13, marginBottom: 28 }}>4 Founders · 11 Exams · Modern Work &amp; Security Designations</p>

          {/* Progress */}
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 24 }}>
            <div style={{ flex: 1, background: "#181828", borderRadius: 4, height: 5, overflow: "hidden" }}>
              <div style={{ width: pct + "%", height: "100%", background: "linear-gradient(90deg,#00C9A7,#A78BFA)", borderRadius: 4, transition: "width .5s ease" }} />
            </div>
            <span style={{ fontSize: 12, color: "#6a6a7a", whiteSpace: "nowrap" }}>{doneCount}/{allCerts.length} passed</span>
          </div>

          {/* Stats */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
            {[["Total Exams","11"],["Est. Exam Cost","~$2,541"],["Timeline","12–18 months"],["Designations","Modern Work + Security"]].map(([l,v]) => (
              <div key={l} style={{ background: "rgba(255,255,255,.03)", border: "1px solid #1e1e3a", borderRadius: 8, padding: "10px 18px" }}>
                <div style={{ fontSize: 9, color: "#4a4a6a", letterSpacing: ".12em", textTransform: "uppercase", marginBottom: 4 }}>{l}</div>
                <div style={{ fontSize: 16, color: "#f0ede8", fontWeight: 600 }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* PHASE FILTER */}
      <div style={{ maxWidth: 860, margin: "0 auto", padding: "20px 24px 0" }}>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {[["all","All Phases"],["1","Phase 1 — Foundations"],["2","Phase 2 — Associate"],["3","Phase 3 — Expert"]].map(([val,label]) => (
            <button key={val} onClick={() => setActivePhase(val)} style={{
              padding: "5px 14px", borderRadius: 20, border: "1px solid",
              borderColor: activePhase === val ? "#00C9A7" : "#252535",
              background: activePhase === val ? "rgba(0,201,167,.1)" : "transparent",
              color: activePhase === val ? "#00C9A7" : "#5a5a6a",
              cursor: "pointer", fontSize: 11, letterSpacing: ".04em", transition: "all .2s"
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* CERT LIST */}
      <div style={{ maxWidth: 860, margin: "0 auto", padding: "24px 24px 60px" }}>
        {visiblePhases.map((phase, pi) => (
          <div key={phase.phase} style={{ marginBottom: 40 }}>

            {/* Phase header */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 5 }}>
                <div style={{ width: 26, height: 26, borderRadius: "50%", background: phase.color + "18", border: "1.5px solid " + phase.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: phase.color, fontWeight: 700, flexShrink: 0 }}>{phase.phase}</div>
                <h2 style={{ fontFamily: "'EB Garamond', serif", fontSize: 18, fontWeight: 400, color: "#f0ede8" }}>{phase.phaseLabel}</h2>
              </div>
              <p style={{ fontSize: 12, color: "#5a5a6a", paddingLeft: 36 }}>{phase.phaseDesc}</p>
            </div>

            {/* Cards */}
            {phase.items.map((cert) => {
              const isOpen = expanded === cert.id;
              const isDone = !!completed[cert.id];
              const lc = levelColor[cert.level] || "#00C9A7";
              return (
                <div key={cert.id} style={{ marginBottom: 8, background: isDone ? "rgba(0,201,167,.03)" : "rgba(255,255,255,.02)", border: "1px solid " + (isDone ? "rgba(0,201,167,.25)" : isOpen ? "#2a2a4e" : "#181828"), borderRadius: 10, overflow: "hidden", opacity: isDone ? .7 : 1, transition: "border-color .2s, opacity .2s" }}>

                  {/* Row */}
                  <div onClick={() => toggle(cert.id)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "14px 18px", cursor: "pointer" }}>
                    <button onClick={(e) => toggleDone(cert.id, e)} style={{ width: 20, height: 20, borderRadius: 4, border: "1.5px solid " + (isDone ? "#00C9A7" : "#2a2a4a"), background: isDone ? "#00C9A7" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0, transition: "all .2s" }}>
                      {isDone && <span style={{ color: "#0a0a0f", fontSize: 11, fontWeight: 700 }}>✓</span>}
                    </button>
                    <div style={{ background: lc + "18", border: "1px solid " + lc + "44", color: lc, borderRadius: 5, padding: "3px 9px", fontSize: 11, fontWeight: 700, letterSpacing: ".04em", flexShrink: 0 }}>{cert.id}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, color: isDone ? "#5a5a6a" : "#e8e6e0", fontFamily: "'EB Garamond', serif", textDecoration: isDone ? "line-through" : "none" }}>{cert.name}</div>
                      <div style={{ fontSize: 11, color: "#4a4a6a", marginTop: 2 }}>{cert.whoTakes} · {cert.weeks} · {cert.cost}</div>
                    </div>
                    <div style={{ fontSize: 9, color: lc, textTransform: "uppercase", letterSpacing: ".08em", flexShrink: 0, display: window.innerWidth > 480 ? "block" : "none" }}>{cert.level}</div>
                    <div style={{ color: "#3a3a5a", fontSize: 14, transform: isOpen ? "rotate(180deg)" : "none", transition: "transform .2s", flexShrink: 0 }}>▾</div>
                  </div>

                  {/* Expanded */}
                  {isOpen && (
                    <div style={{ borderTop: "1px solid #181828", padding: "20px 18px 20px 48px" }}>
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 20 }}>

                        {/* Left */}
                        <div>
                          <p style={{ fontSize: 9, color: "#4a4a6a", textTransform: "uppercase", letterSpacing: ".12em", marginBottom: 10 }}>Exam Details</p>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", rowGap: 7, columnGap: 12, fontSize: 12, marginBottom: 18 }}>
                            {[["Cost",cert.cost],["Duration",cert.duration],["Questions",cert.questions],["Pass Score",cert.passingScore],["Validity",cert.expiry],["Prerequisite",cert.prerequisite]].map(([k,v]) => (
                              <div key={k}><span style={{ color: "#4a4a6a" }}>{k}: </span><span style={{ color: "#c0beba" }}>{v}</span></div>
                            ))}
                          </div>
                          <p style={{ fontSize: 9, color: "#4a4a6a", textTransform: "uppercase", letterSpacing: ".12em", marginBottom: 6 }}>Designation Target</p>
                          <p style={{ fontSize: 12, color: "#A78BFA", marginBottom: 16 }}>{cert.designation}</p>
                          <p style={{ fontSize: 9, color: "#4a4a6a", textTransform: "uppercase", letterSpacing: ".12em", marginBottom: 6 }}>Best Free Resource</p>
                          <p style={{ fontSize: 12, color: "#00C9A7", lineHeight: 1.5 }}>{cert.freeResource}</p>
                        </div>

                        {/* Right */}
                        <div>
                          <p style={{ fontSize: 9, color: "#4a4a6a", textTransform: "uppercase", letterSpacing: ".12em", marginBottom: 10 }}>Key Topics</p>
                          <ul style={{ paddingLeft: 16, fontSize: 12, color: "#9a9898", lineHeight: 1.9, marginBottom: 16 }}>
                            {cert.keyTopics.map(t => <li key={t}>{t}</li>)}
                          </ul>
                          <div style={{ background: "rgba(255,200,50,.05)", border: "1px solid rgba(255,200,50,.18)", borderRadius: 8, padding: "12px 14px" }}>
                            <p style={{ fontSize: 9, color: "#c49a10", textTransform: "uppercase", letterSpacing: ".1em", marginBottom: 6 }}>Exam Tip</p>
                            <p style={{ fontSize: 12, color: "#c0beba", lineHeight: 1.65 }}>{cert.tip}</p>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}

        {/* Footer notes */}
        <div style={{ borderTop: "1px solid #181828", paddingTop: 24, display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(180px,1fr))", gap: 12 }}>
          {[
            ["Retake Policy","Fail → 24h wait before retake 1. Subsequent fails → 14 day wait. Maximum 5 attempts per exam per year."],
            ["Free Renewals","All Associate and Expert certs renew annually via a short free online assessment on Microsoft Learn. No resitting the full exam."],
            ["Personal Email","Take all exams under personal Microsoft accounts, not your company email. Then link to Partner Center. You own the certs forever."],
            ["Cost Tip","Attend Microsoft Virtual Training Days for free AZ-900 vouchers. Beta exams cost 80% less — watch for new beta releases."],
          ].map(([title,text]) => (
            <div key={title} style={{ background: "rgba(255,255,255,.02)", border: "1px solid #181828", borderRadius: 8, padding: "14px 16px" }}>
              <p style={{ fontSize: 9, color: "#5a5a6a", textTransform: "uppercase", letterSpacing: ".1em", marginBottom: 7 }}>{title}</p>
              <p style={{ fontSize: 11, color: "#5a5a6a", lineHeight: 1.65 }}>{text}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
